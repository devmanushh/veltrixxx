services:
  postgres:
    image: postgres:16-alpine
    container_name: veltrix-postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: veltrix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d veltrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: veltrix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:


  
